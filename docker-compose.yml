version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ldrs_v3_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ldrs_v3
      POSTGRES_USER: ldrs
      POSTGRES_PASSWORD: ldrs_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ldrs -d ldrs_v3"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
